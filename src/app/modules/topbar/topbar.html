<div class="topbar">
  <div class="topbar-left">
    <button
      class="mobile-menu-btn d-md-none"
      type="button"
      data-bs-toggle="offcanvas"
      data-bs-target="#mobileSidebar">
      ☰
    </button>
    <div class="logo d-md-none">
      <span class="title-light">Maisy’</span>Meal<span class="dot">.</span>
    </div>
  </div>

  <button class="view-btn" (click)="openCart()">
    <span>檢視購物車</span>
    <img class="icon" src="assets/icons/cart.svg" alt="">
    @if (cartCount > 0) {
      <span class="badge">{{ cartCount }}</span>
    }
  </button>
</div>
