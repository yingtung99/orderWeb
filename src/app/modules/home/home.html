<div class="home-page">
  <div class="home-card">
    <div class="brand">
      <span class="title-light">Maisy’</span>Meal<span class="dot">.</span>
    </div>

    <h2 class="home-title">歡迎光臨</h2>
    <p class="home-subtitle">請輸入內用桌號開始點餐</p>

    <input
      type="text"
      class="table-input"
      placeholder="例如：A01"
      [(ngModel)]="tableNumber"
      (input)="showError = false"
      (keydown.enter)="confirmTableNumber()"
    >

    @if (showError) {
      <div class="error-text">
        請先輸入桌號
      </div>
    }

    <button
      type="button"
      class="confirm-btn"
      (click)="confirmTableNumber()"
    >
      確認開始點餐
    </button>
  </div>
</div>
